<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login e Cadastro</title>
    <link rel="stylesheet" href="/public/static/styles/main.css">
    <link rel="stylesheet" href="/public/static/styles/login.css">
    <script defer async src="/public/static/script/login.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <h1>RePA</h1>
        </div>
        <nav class="auth-buttons">
            <button class="btn-return"><a href="/public/pages/home.html">voltar</a></button>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Área de Login/Cadastro -->
        <div id="authContainer" style="width: 100%; max-width: 400px;">
            <!-- Formulário de Login -->
            <div id="loginForm" class="container" style="display: none;">
                <h2>🔐 Entrar</h2>
                <div id="loginMessage" class="message"></div>
                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginEmail">E-mail</label>
                        <input type="email" id="loginEmail" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Senha</label>
                        <input type="password" id="loginPassword" required placeholder="Sua senha">
                    </div>
                    <button type="submit" class="submit-btn">Entrar</button>
                </form>
                <p class="toggle-form">
                    Não tem uma conta? <a onclick="showForm('register')">Cadastre-se</a>
                </p>
            </div>

            <!-- Formulário de Cadastro -->
            <div id="registerForm" class="container" style="display: none;">
                <h2>📝 Criar Conta</h2>
                <div id="registerMessage" class="message"></div>
                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="registerName">Nome completo</label>
                        <input type="text" id="registerName" required placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="registerEmail">E-mail</label>
                        <input type="email" id="registerEmail" required placeholder="seu@email.com">
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">Senha</label>
                        <input type="password" id="registerPassword" required placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="form-group">
                        <label for="registerConfirmPassword">Confirmar Senha</label>
                        <input type="password" id="registerConfirmPassword" required placeholder="Repita a senha">
                    </div>
                    <button type="submit" class="submit-btn">Criar Conta</button>
                </form>
                <p class="toggle-form">
                    Já tem uma conta? <a onclick="showForm('login')">Faça login</a>
                </p>
            </div>

            <!-- Área do Usuário Logado -->
            <div id="userArea" class="user-greeting" style="display: none;">
                <h2>👋 Bem-vindo(a)!</h2>
                <p id="userNameDisplay" style="font-size: 1.2rem; margin: 1rem 0;"></p>
                <p>Você está logado no sistema.</p>
                <button class="logout-btn" onclick="logout()">Sair da Conta</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2024 Sistema. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
